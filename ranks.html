<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Light Yagami Server</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}
.top-nav{
    position: absolute;
    top: 30px;
    left: 40px;
}

.home-btn{
    text-decoration: none;
    color: white;
    font-size: 18px;
    padding: 10px 25px;
    border: 2px solid red;
    border-radius: 8px;
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 10px red;
    transition: 0.3s;
}

.home-btn:hover{
    background: red;
    box-shadow: 0 0 20px red;
}
body{
height:100vh;
background:url("bg.jpg") center/cover no-repeat fixed;
background:
linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
url("https://images.alphacoders.com/133/1330714.jpeg");
background-size:cover;
background-position:center;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}
body{
    background:url("bg.jpg") center/cover no-repeat fixed;
}
/* TITLE */

h1{
font-size:48px;
letter-spacing:3px;
color:#ff3b3b;
text-shadow:0 0 20px red;
margin-bottom:10px;
}

.subtitle{
color:#ff9bdc;
margin-bottom:50px;
font-weight:600;
}

/* CARD CONTAINER */

.rank-container{
display:flex;
gap:35px;
}

/* CARD */

.card{
width:230px;
padding:30px;
border-radius:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
text-align:center;
transition:0.4s;
position:relative;
border:2px solid transparent;
}

/* HOVER EFFECT */

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 30px currentColor;
}

/* ICON */

.icon{
font-size:35px;
margin-bottom:15px;
}

/* TITLE */

.rank{
font-size:26px;
font-weight:800;
margin-bottom:15px;
}

/* LIST */

.card ul{
list-style:none;
text-align:left;
}

.card li{
margin:8px 0;
opacity:0.9;
}

/* COLORS */

.goat{
color:#ff9b2f;
border-color:#ff9b2f;
box-shadow:0 0 15px #ff9b2f55;
}

.elite{
color:#00eaff;
border-color:#00eaff;
box-shadow:0 0 15px #00eaff55;
}

.legend{
color:#ff2fff;
border-color:#ff2fff;
box-shadow:0 0 15px #ff2fff55;
}

.hero{
color:#6cff6c;
border-color:#6cff6c;
box-shadow:0 0 15px #6cff6c55;
}

</style>
</head>

<body>
<div class="top-nav">
    <a href="index.html" class="home-btn">⬅ Home</a>
</div>
<h1>LIGHT YAGAMI SERVER</h1>
<div class="subtitle">SERVER RANK PERKS</div>

<div class="rank-container">

<div class="card goat">
<div class="icon">🐐</div>
<div class="rank">GOAT</div>
<ul>
<li>✔ Permissions</li>
<li>✔ Admin</li>
<li>✔ Commands</li>
</ul>
</div>

<div class="card elite">
<div class="icon">💎</div>
<div class="rank">ELITE</div>
<ul>
<li>✔ Homes</li>
<li>✔ Extra Homes</li>
<li>✔ Kit Elite</li>
</ul>
</div>

<div class="card legend">
<div class="icon">⚡</div>
<div class="rank">LEGEND</div>
<ul>
<li>✔ Champion</li>
<li>✔ 3 Homes</li>
<li>✔ Commands</li>
</ul>
</div>

<div class="card hero">
<div class="icon">🛡</div>
<div class="rank">HERO</div>
<ul>
<li>✔ Admin Chat</li>
<li>✔ Homes</li>
<li>✔ Commands</li>
</ul>
</div>

</div>

</body>
</html>
